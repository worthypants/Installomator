name: Sync Installomator from Upstream

on:
  schedule:
    - cron: '0 3 * * *'   # nightly at 03:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gnos1s.prod.auto
        uses: actions/checkout@v5
        with:
          ref: gnos1s.prod.auto

      - name: Check for upstream changes
        id: check
        run: |
          git remote add upstream https://github.com/Installomator/Installomator.git
          git fetch upstream main

          UPSTREAM_SHA=$(git rev-parse upstream/main)
          LAST_SHA=$(cat .last_upstream_sha 2>/dev/null || echo "none")

          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

          if [ "$UPSTREAM_SHA" = "$LAST_SHA" ]; then
            echo "No upstream changes since last sync ($UPSTREAM_SHA). Skipping."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Upstream has new commits (was: $LAST_SHA, now: $UPSTREAM_SHA). Proceeding."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Fetch upstream main and reset branch
        if: steps.check.outputs.changed == 'true'
        run: |
          # Preserve assemble.sh — it lives in our branch, not upstream
          cp -L utils/assemble.sh /tmp/assemble.sh
          git reset --hard upstream/main
          mkdir -p utils
          cp /tmp/assemble.sh utils/assemble.sh
          echo "Branch reset to upstream/main at $(git log -1 --format='%h %s')"

      - name: Apply patches
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          ok=1

          # ── fragments/header.sh ─────────────────────────────────────────────
          # Patch 1 — insert DATADOG_*FORMAT vars after datadogAPI=""
          grep -q 'datadogAPI=""' fragments/header.sh \
            || { echo "ERROR: Patch 1 anchor (datadogAPI) not found in fragments/header.sh"; ok=0; }

          if [[ $ok -eq 1 ]]; then
            p1=0
            while IFS= read -r line || [[ -n "$line" ]]; do
              if [[ $p1 -eq 0 && "$line" == 'datadogAPI=""' ]]; then
                printf '%s\n' "$line"
                printf '%s\n' $'DATADOG_LOGFORMAT=\'${log_priority} : $mdmURL : Installomator-${label} : ${VERSIONDATE//-/} : $SESSION : ${logmessage}\''
                printf '%s\n' $'DATADOG_REPEAT_LOGFORMAT=\'${log_priority} : $mdmURL : $APPLICATION : $VERSION : $SESSION : Last Log repeated ${logrepeat} times\''
                p1=1; continue
              fi
              printf '%s\n' "$line"
            done < "fragments/header.sh" > "fragments/header.sh.tmp"
            mv "fragments/header.sh.tmp" "fragments/header.sh"
            [[ $p1 -eq 0 ]] && { echo "WARNING: Patch 1 (datadogAPI) not applied in fragments/header.sh"; ok=0; }
          fi

          # ── fragments/functions.sh ──────────────────────────────────────────
          # Patch 2 — replace repeat-log curl one-liner with eval + curl
          # Patch 3 — replace standard-log curl one-liner with eval + curl
          p2=0; p3=0
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ $p2 -eq 0 && "$line" == *'Last Log repeated ${logrepeat} times" > /dev/null'* ]]; then
              indent="${line%%curl*}"
              printf '%s\n' "${indent}"'datadogLogEntry=$(eval "echo $DATADOG_REPEAT_LOGFORMAT")'
              printf '%s\n' "${indent}"'curl -s -X POST https://http-intake.logs.datadoghq.com/v1/input -H "Content-Type: text/plain" -H "DD-API-KEY: $datadogAPI" -d "${datadogLogEntry}" > /dev/null'
              p2=1; continue
            fi
            if [[ $p3 -eq 0 && "$line" == *'Installomator-${label}'*'${logmessage}" > /dev/null'* ]]; then
              indent="${line%%curl*}"
              printf '%s\n' "${indent}"'datadogLogEntry=$(eval "echo $DATADOG_LOGFORMAT")'
              printf '%s\n' "${indent}"'curl -s -X POST https://http-intake.logs.datadoghq.com/v1/input -H "Content-Type: text/plain" -H "DD-API-KEY: $datadogAPI" -d "${datadogLogEntry}" > /dev/null'
              p3=1; continue
            fi
            printf '%s\n' "$line"
          done < "fragments/functions.sh" > "fragments/functions.sh.tmp"
          mv "fragments/functions.sh.tmp" "fragments/functions.sh"
          [[ $p2 -eq 0 ]] && { echo "WARNING: Patch 2 (repeat-log curl) not found in fragments/functions.sh"; ok=0; }
          [[ $p3 -eq 0 ]] && { echo "WARNING: Patch 3 (standard-log curl) not found in fragments/functions.sh"; ok=0; }

          # ── Post-patch validation ────────────────────────────────────────────
          grep -q 'DATADOG_LOGFORMAT' fragments/header.sh \
            || { echo "ERROR: Post-patch validation failed — DATADOG_LOGFORMAT missing from header.sh"; ok=0; }
          grep -q 'DATADOG_REPEAT_LOGFORMAT' fragments/header.sh \
            || { echo "ERROR: Post-patch validation failed — DATADOG_REPEAT_LOGFORMAT missing from header.sh"; ok=0; }
          grep -q 'datadogLogEntry' fragments/functions.sh \
            || { echo "ERROR: Post-patch validation failed — datadogLogEntry missing from functions.sh"; ok=0; }

          [[ $ok -eq 1 ]] && echo "All 3 patches applied and validated." || exit 1

      - name: Assemble script
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "Running assemble.sh --script..."
          chmod +x utils/assemble.sh
          ./utils/assemble.sh --script
          echo "Assemble completed."

      - name: Commit and force push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update the stored upstream SHA so we don't re-run until there's a new upstream commit
          echo "${{ steps.check.outputs.upstream_sha }}" > .last_upstream_sha

          git add fragments/header.sh fragments/functions.sh .last_upstream_sha
          git add Installomator.sh 2>/dev/null || true   # assembled output, may or may not exist

          if git diff --cached --quiet; then
            echo "No changes to commit after patching and assembly."
          else
            git commit -m "Sync upstream ${{ steps.check.outputs.upstream_sha }} + apply patches + assemble"
          fi

          git push --force origin HEAD:gnos1s.prod.auto

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Installomator sync failed — one or more patches did not apply. Upstream may have changed the patched lines. Review the run logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
